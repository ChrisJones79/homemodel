# .github/workflows/readme-update.yml
#
# Dispatches the readme-updater (Claude) agent whenever a PR is merged to master.
# The agent reviews the PR summary and changed files, then opens a follow-up PR
# updating the relevant module READMEs.
#
# Triggered by: push to master.  The first step resolves the associated PR via
# the GitHub API — works for default merges, squash merges, and rebase merges.
#
# Required permissions (GITHUB_TOKEN):
#   issues: write       — create the briefing issue
#   contents: read      — read changed files and READMEs
#   pull-requests: read — fetch PR title and body
#
# MANAGER_TOKEN (PAT) is preferred for the GraphQL agent-assignment call and
# falls back to the built-in GITHUB_TOKEN.

name: README Update Agent

on:
  push:
    branches: [master]

env:
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  dispatch-readme-updater:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth 2 gives HEAD and HEAD~1 for the diff
          fetch-depth: 2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve merged PR from commit SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.MANAGER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          # Works for default merges, squash merges, and rebase merges
          PR_NUMBER=$(gh api "repos/${REPO_OWNER}/${REPO_NAME}/commits/${SHA}/pulls" \
            --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with commit $SHA — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false"        >> "$GITHUB_OUTPUT"
          echo "Detected PR #$PR_NUMBER"

      - name: Fetch PR metadata
        if: steps.pr.outputs.skip != 'true'
        id: meta
        env:
          GH_TOKEN: ${{ secrets.MANAGER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          TITLE=$(gh pr view "$PR" --repo "${REPO_OWNER}/${REPO_NAME}" --json title -q .title)
          BODY=$(gh pr view "$PR"  --repo "${REPO_OWNER}/${REPO_NAME}" --json body  -q .body)
          # Write via files to avoid multi-line env-var quoting issues
          echo "$TITLE" > /tmp/pr_title.txt
          printf '%s' "$BODY" > /tmp/pr_body.txt
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        if: steps.pr.outputs.skip != 'true'
        run: |
          python3 << 'PYEOF2'
          import os, subprocess

          pr_number = "${{ steps.pr.outputs.number }}"
          pr_title  = open("/tmp/pr_title.txt").read().strip()
          pr_body   = open("/tmp/pr_body.txt").read().strip()

          # Changed files between this commit and its parent
          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True, text=True, check=True,
          )
          changed = [f for f in result.stdout.strip().splitlines() if f]

          # Map changed paths -> README paths.
          # Walks every parent directory of each changed file, stopping at the
          # repo root, so nested modules (e.g. tools/plan_reader/) are covered.
          from pathlib import Path
          readmes = set()
          for f in changed:
              for parent in Path(f).parents:
                  readme = parent / "README.md"
                  if readme.exists():
                      readmes.add(str(readme))

          readmes = sorted(readmes)
          print(f"Affected READMEs: {readmes}")

          lines = [
              "## Merged PR",
              "",
              f"**#{pr_number}: {pr_title}**",
              "",
              "### PR Description",
              "",
              pr_body or "_No description provided._",
              "",
              "### Changed Files",
              "",
              "```",
          ] + changed + [
              "```",
              "",
              "### READMEs to Review",
              "",
          ]

          for readme in readmes:
              if os.path.exists(readme):
                  content = open(readme).read()
                  lines += [
                      f"#### `{readme}`",
                      "",
                      "```markdown",
                      content.rstrip(),
                      "```",
                      "",
                  ]

          with open("/tmp/issue_body.md", "w") as fh:
              fh.write("\n".join(lines))

          chars = sum(len(l) + 1 for l in lines)
          print(f"Issue body: {chars} chars, {len(readmes)} README(s) included")
          PYEOF2

      - name: Create briefing issue
        if: steps.pr.outputs.skip != 'true'
        id: issue
        env:
          GH_TOKEN: ${{ secrets.MANAGER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          TITLE=$(cat /tmp/pr_title.txt)
          ISSUE_URL=$(gh issue create \
            --repo "${REPO_OWNER}/${REPO_NAME}" \
            --title "docs: update READMEs after PR #${PR} — ${TITLE}" \
            --body-file /tmp/issue_body.md)
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oP '\d+$')
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Created issue #$ISSUE_NUMBER: $ISSUE_URL"

      - name: Assign readme-updater agent (Claude)
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.MANAGER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"

          # Fetch repo node-ID and anthropic-code-agent bot-ID
          REPO_DATA=$(gh api graphql \
            -f query='query($owner:String!,$name:String!){
              repository(owner:$owner,name:$name){
                id
                suggestedActors(capabilities:[CAN_BE_ASSIGNED],first:20){
                  nodes{id login}
                }
              }
            }' \
            -f owner="${REPO_OWNER}" \
            -f name="${REPO_NAME}")

          REPO_ID=$(echo "$REPO_DATA" | jq -r '.data.repository.id')
          BOT_ID=$(echo "$REPO_DATA" | jq -r \
            '.data.repository.suggestedActors.nodes[]
             | select(.login == "anthropic-code-agent") | .id')

          if [ -z "$BOT_ID" ]; then
            echo "::error::anthropic-code-agent not found in suggestedActors."
            echo "$REPO_DATA" | jq -r '.data.repository.suggestedActors.nodes[].login'
            exit 1
          fi

          # Fetch issue node-ID
          ISSUE_ID=$(gh api graphql \
            -f query='query($owner:String!,$name:String!,$number:Int!){
              repository(owner:$owner,name:$name){
                issue(number:$number){id}
              }
            }' \
            -f owner="${REPO_OWNER}" \
            -f name="${REPO_NAME}" \
            -F number="$ISSUE_NUMBER" \
            | jq -r '.data.repository.issue.id')

          # Assign agent — same mutation as scripts/manager.py
          gh api graphql \
            --header "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection" \
            -f query='mutation($issueId:ID!,$botId:ID!,$repoId:ID!,$baseRef:String!,$customAgent:String!){
              addAssigneesToAssignable(input:{
                assignableId:$issueId,
                assigneeIds:[$botId],
                agentAssignment:{
                  targetRepositoryId:$repoId,
                  baseRef:$baseRef,
                  customInstructions:"",
                  customAgent:$customAgent,
                  model:""
                }
              }){
                assignable{
                  ...on Issue{
                    id
                    assignees(first:10){nodes{login}}
                  }
                }
              }
            }' \
            -f issueId="$ISSUE_ID" \
            -f botId="$BOT_ID" \
            -f repoId="$REPO_ID" \
            -f baseRef="master" \
            -f customAgent="readme-updater"

          echo "readme-updater agent assigned to issue #$ISSUE_NUMBER"
