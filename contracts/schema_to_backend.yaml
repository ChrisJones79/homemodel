interface: schema_to_backend
version: 1
description: >
  How the backend queries and mutates the model data store.
  Backend is the only consumer of the schema layer.

surfaces:
  - producer: "SchemaStore.get_entity(id: str)"
    contract:
      name: Entity
      fields:
        id: "string — UUID"
        type: "string — enum: terrain_patch, structure, wall, room, tree, feature"
        geometry: "GeoJSON or vertex list"
        position_gps: "{lat, lon, alt_m}"
        provenance: "{source_type, source_id, timestamp, accuracy_m}"
        version: "integer — increments on update"
        properties: "dict — type-specific key/values"
    consumer: "API.GET /entities/{id}"

  - producer: "SchemaStore.query_region(bbox: BBox)"
    contract:
      name: EntityList
      fields:
        entities: "[{id, type, bounds, version}]"
        total_count: "integer"
    consumer: "API.GET /entities?bbox=sw_lat,sw_lon,ne_lat,ne_lon"

  - producer: "SchemaStore.upsert_entity(entity: Entity)"
    contract:
      name: UpsertResult
      fields:
        id: "string"
        version: "integer"
        status: "string — enum: created, updated"
    consumer: "API.POST /entities"

  - producer: "SchemaStore.get_history(id: str)"
    contract:
      name: EntityHistory
      fields:
        id: "string"
        revisions: "[{version, timestamp, provenance, diff_summary}]"
    consumer: "API.GET /entities/{id}/history"

test_fixtures:
