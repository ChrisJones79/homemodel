interface: backend_to_viewer
version: 1
description: >
  How the 3D viewer fetches model data and assets from the backend.
  Viewer is a pure consumer — never writes back through this interface.

surfaces:
  - producer: "API.GET /scene/manifest"
    contract:
      name: SceneManifest
      fields:
        bounds_gps: "{sw: {lat, lon}, ne: {lat, lon}}"
        origin_gps: "{lat, lon, alt_m} — world origin for local coords"
        entity_count: "integer"
        lod_levels: "[{level: int, max_distance_m: float, mesh_url: string}]"
        last_updated: "ISO 8601 timestamp"
    consumer: "Viewer.loadScene()"

  - producer: "API.GET /scene/tiles/{z}/{x}/{y}.glb"
    contract:
      name: SceneTile
      fields:
        format: "glTF binary (.glb)"
        coordinate_system: "Y-up, meters, origin at scene origin_gps"
        contents: "terrain mesh + entities within tile bounds"
    consumer: "Viewer.loadTile(z, x, y)"

  - producer: "API.GET /entities/{id}/mesh"
    contract:
      name: EntityMesh
      fields:
        format: "glTF binary (.glb)"
        id: "string — matches entity UUID"
        lod: "integer — requested detail level"
        textures_embedded: "boolean"
    consumer: "Viewer.loadEntityDetail(id)"

  - producer: "API.GET /nav/viewpoints"
    contract:
      name: ViewpointList
      fields:
        viewpoints: "[{id, label, position_gps, look_at_gps, indoor: bool}]"
    consumer: "Viewer.buildNavMenu()"

test_fixtures:
