<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeModel 3D Viewer</title>

  <!-- Three.js import map — resolves bare specifiers used in all JS modules.
       Paths point to a vendored copy so the viewer works offline / in stub mode
       without any CDN access. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>

  <style>
    /* -----------------------------------------------------------------------
       Base reset
    ----------------------------------------------------------------------- */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* -----------------------------------------------------------------------
       Render target
    ----------------------------------------------------------------------- */
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* -----------------------------------------------------------------------
       Navigation overlay
    ----------------------------------------------------------------------- */
    #nav-overlay {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.70);
      border-radius: 8px;
      padding: 12px;
      min-width: 160px;
      backdrop-filter: blur(4px);
    }

    #nav-overlay h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #nav-menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Viewpoint buttons */
    .nav-btn {
      display: block;
      width: 100%;
      padding: 7px 12px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 5px;
      color: #f0f0f0;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-btn:hover,
    .nav-btn:focus-visible {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.40);
      outline: none;
    }

    .nav-btn:active {
      background: rgba(255, 255, 255, 0.30);
    }

    /* Indoor viewpoints get a subtle tint */
    .nav-btn--indoor {
      border-color: rgba(100, 180, 255, 0.40);
    }

    .nav-btn--indoor::before {
      content: '🏠 ';
      font-size: 11px;
    }

    /* -----------------------------------------------------------------------
       VR entry button
    ----------------------------------------------------------------------- */
    #vr-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      padding: 12px 24px;
      background: #1a1a1a;
      border: 2px solid #ff6d00;
      border-radius: 6px;
      color: #ff6d00;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
    }

    #vr-button:hover,
    #vr-button:focus-visible {
      background: #ff6d00;
      color: #fff;
      box-shadow: 0 0 16px rgba(255, 109, 0, 0.55);
      outline: none;
    }

    #vr-button:active {
      background: #e65100;
      border-color: #e65100;
    }

    #vr-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #555;
      color: #555;
    }

    /* -----------------------------------------------------------------------
       Entity inspect panel
    ----------------------------------------------------------------------- */
    #inspect-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 300;
      width: 300px;
      max-height: 60vh;
      overflow-y: auto;
      background: rgba(10, 10, 20, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 14px 16px 16px;
      color: #f0f0f0;
      font-size: 13px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.55);
    }

    #inspect-panel h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      padding-right: 24px; /* room for close button */
    }

    .inspect-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }

    .inspect-close:hover,
    .inspect-close:focus-visible {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      outline: none;
    }

    #inspect-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 3px 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      word-break: break-all;
    }

    .inspect-meta-label {
      color: #8a8a9a;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      align-self: center;
    }

    .inspect-meta-value {
      color: #d0d0e0;
      font-size: 12px;
    }

    .inspect-table {
      width: 100%;
      border-collapse: collapse;
    }

    .inspect-table th,
    .inspect-table td {
      padding: 4px 6px;
      text-align: left;
      font-size: 12px;
      vertical-align: top;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .inspect-table th {
      color: #8a8a9a;
      font-weight: 600;
      white-space: nowrap;
      width: 40%;
    }

    .inspect-table td {
      color: #e0e0f0;
    }

    .inspect-no-props {
      color: #666;
      font-style: italic;
    }

    /* -----------------------------------------------------------------------
       Controls hint
    ----------------------------------------------------------------------- */
    #controls-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.60);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      color: #bbb;
      font-size: 11px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      pointer-events: none;
      user-select: none;
    }

    /* -----------------------------------------------------------------------
       Stub-mode indicator
    ----------------------------------------------------------------------- */
    #stub-indicator {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 200;
      padding: 5px 10px;
      background: rgba(255, 179, 0, 0.85);
      color: #1a1a1a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      border-radius: 4px;
      text-transform: uppercase;
      display: none; /* shown by inline script below if ?stub=1 */
    }

    /* -----------------------------------------------------------------------
       Asset Browser overlay
    ----------------------------------------------------------------------- */
    #browser-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: none; /* opened by browser.js */
      flex-direction: column;
      background: #111118;
      color: #e0e0f0;
    }

    /* Toolbar */
    .br-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 16px;
      background: #1a1a26;
      border-bottom: 1px solid #2a2a40;
      flex-shrink: 0;
    }

    .br-toolbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.03em;
    }

    .br-toolbar-actions {
      display: flex;
      gap: 8px;
    }

    .br-toolbar-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: #c8c8e8;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .br-toolbar-btn:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.30);
    }

    /* Three-column body */
    .br-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ---- Column: Databases ---- */
    .br-col-dbs {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid #2a2a40;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Column: Entities ---- */
    .br-col-entities {
      width: 290px;
      flex-shrink: 0;
      border-right: 1px solid #2a2a40;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Column: Detail (preview + attrs) ---- */
    .br-col-detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Column header */
    .br-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #2a2a40;
      flex-shrink: 0;
      gap: 8px;
    }

    .br-col-header h3 {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7070a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .br-icon-btn {
      padding: 3px 8px;
      background: none;
      border: 1px solid #2a2a40;
      border-radius: 4px;
      color: #7070a0;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .br-icon-btn:hover {
      color: #e0e0f0;
      border-color: #5050aa;
    }

    .br-col-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* Type filter select */
    .br-type-select {
      flex: 1;
      padding: 4px 8px;
      background: #1a1a26;
      border: 1px solid #2a2a40;
      border-radius: 4px;
      color: #c0c0e0;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    .br-type-select:focus {
      border-color: #5555cc;
    }

    /* Database cards */
    .br-db-card {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: #1a1a26;
      border: 1px solid #2a2a40;
      border-radius: 6px;
      color: #e0e0f0;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .br-db-card:hover {
      background: #22223a;
      border-color: #4040aa;
    }

    .br-db-card.br-selected {
      background: #1e1e38;
      border-color: #5555cc;
    }

    .br-db-name {
      display: block;
      font-weight: 700;
      font-size: 13px;
      color: #9090e8;
      margin-bottom: 3px;
    }

    .br-db-sub {
      display: block;
      font-size: 11px;
      color: #606080;
    }

    /* Entity rows */
    .br-entity-row {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 4px;
      background: #1a1a26;
      border: 1px solid #2a2a40;
      border-radius: 5px;
      color: #e0e0f0;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .br-entity-row:hover {
      background: #22223a;
      border-color: #4040aa;
    }

    .br-entity-row.br-selected {
      background: #1e1e38;
      border-color: #5555cc;
    }

    .br-ent-type {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #5588ff;
    }

    .br-type-tree      { color: #4caf50; }
    .br-type-wall      { color: #ff9800; }
    .br-type-structure { color: #42a5f5; }
    .br-type-building  { color: #42a5f5; }
    .br-type-terrain   { color: #8bc34a; }

    .br-ent-id {
      font-size: 12px;
      color: #9090b8;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .br-ent-meta {
      font-size: 11px;
      color: #505068;
    }

    /* ---- Preview pane ---- */
    .br-preview-pane {
      flex: 0 0 55%;
      position: relative;
      background: #0d0d1a;
      border-bottom: 1px solid #2a2a40;
      overflow: hidden;
    }

    #br-preview-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .br-preview-gps {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.80);
      background: rgba(0,0,0,0.55);
      padding: 4px 10px;
      border-radius: 12px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .br-preview-controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
    }

    .br-preview-btn {
      padding: 5px 12px;
      background: rgba(15,15,35,0.80);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 5px;
      color: #c8c8e8;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      backdrop-filter: blur(4px);
    }

    .br-preview-btn:hover:not(:disabled) {
      background: rgba(40,40,80,0.90);
    }

    .br-preview-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ---- Attribute pane ---- */
    .br-attr-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0a0a14;
    }

    .br-attr-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid #1a1a2e;
      flex-shrink: 0;
      gap: 8px;
    }

    #br-attr-title {
      font-size: 13px;
      font-weight: 600;
      color: #9090b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .br-attr-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .br-action-btn {
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #b0b0d0;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .br-action-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.30);
    }

    .br-action-btn:disabled {
      opacity: 0.30;
      cursor: not-allowed;
    }

    .br-action-btn.br-save {
      border-color: rgba(80,200,80,0.35);
      color: #80e080;
    }

    .br-action-btn.br-save:hover:not(:disabled) {
      background: rgba(80,200,80,0.12);
    }

    #br-attr-table {
      flex: 1;
      overflow-y: auto;
      padding: 6px 12px 12px;
    }

    /* KV table */
    .br-kv-table {
      width: 100%;
      border-collapse: collapse;
    }

    .br-kv-table thead th {
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #44448a;
      border-bottom: 1px solid #2a2a40;
      text-align: left;
    }

    .br-kv-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.035);
    }

    .br-kv-table tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .br-attr-key {
      padding: 5px 8px;
      font-size: 12px;
      color: #7878b8;
      white-space: nowrap;
      width: 42%;
      font-family: 'SF Mono', 'Fira Code', monospace;
      vertical-align: middle;
    }

    .br-row-edit .br-attr-key {
      color: #9898d8;
    }

    .br-attr-val {
      padding: 4px 4px;
      width: 48%;
      vertical-align: middle;
    }

    .br-attr-ro {
      font-size: 12px;
      color: #b8b8d0;
      word-break: break-all;
    }

    .br-attr-input {
      width: 100%;
      padding: 3px 6px;
      background: #18182c;
      border: 1px solid #34345a;
      border-radius: 3px;
      color: #e8e8ff;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .br-attr-input:focus {
      border-color: #5555cc;
      background: #1c1c38;
    }

    .br-attr-copy-cell {
      padding: 3px 6px;
      text-align: right;
      width: 36px;
      vertical-align: middle;
    }

    .br-copy-btn {
      padding: 2px 6px;
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      color: #505070;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
    }

    .br-copy-btn:hover {
      color: #b0b0d8;
      border-color: rgba(255,255,255,0.25);
    }

    /* Status / loading / error text */
    .br-status {
      padding: 12px 8px;
      font-size: 12px;
      color: #505070;
      text-align: center;
      line-height: 1.5;
    }

    .br-error {
      color: #ff6b6b;
    }
  </style>
</head>
<body>

  <!-- Three.js render target -->
  <div id="canvas-container"></div>

  <!-- Navigation viewpoints overlay -->
  <div id="nav-overlay">
    <h3>Viewpoints</h3>
    <div id="nav-menu">
      <!-- Populated by nav.js -->
    </div>
    <button id="browser-toggle-btn" type="button" class="nav-btn" style="margin-top:10px;">
      📂 Asset Browser
    </button>
  </div>

  <!-- Asset Browser overlay (toggled by browser.js) -->
  <div id="browser-overlay">
    <!-- Toolbar -->
    <div class="br-toolbar">
      <span class="br-toolbar-title">📂 Asset Browser</span>
      <div class="br-toolbar-actions">
        <button id="br-theme-btn" type="button" class="br-toolbar-btn">☀️ Light</button>
        <button id="br-close-btn" type="button" class="br-toolbar-btn">✕ Close</button>
      </div>
    </div>

    <!-- Three-column body -->
    <div class="br-body">

      <!-- Column 1: Database list -->
      <div class="br-col-dbs">
        <div class="br-col-header">
          <h3>Databases</h3>
          <button id="br-refresh-dbs" type="button" class="br-icon-btn" title="Refresh list">↺</button>
        </div>
        <div class="br-col-scroll" id="br-db-list"></div>
      </div>

      <!-- Column 2: Entity list -->
      <div class="br-col-entities">
        <div class="br-col-header">
          <h3 id="br-entities-title">Entities</h3>
          <select id="br-type-filter" class="br-type-select">
            <option value="">All types</option>
          </select>
        </div>
        <div class="br-col-scroll" id="br-entity-list"></div>
      </div>

      <!-- Column 3: Isolated 3-D preview + attribute editor -->
      <div class="br-col-detail">

        <!-- Preview pane -->
        <div class="br-preview-pane">
          <canvas id="br-preview-canvas"></canvas>
          <div class="br-preview-gps" id="br-preview-gps"></div>
          <div class="br-preview-controls">
            <button id="br-view-in-place-btn" type="button" class="br-preview-btn" disabled>
              📍 View in Place
            </button>
          </div>
        </div>

        <!-- Attribute editor -->
        <div class="br-attr-pane">
          <div class="br-attr-toolbar">
            <span id="br-attr-title">Select an entity</span>
            <div class="br-attr-actions">
              <button id="br-save-btn"   type="button" class="br-action-btn br-save" disabled>Save</button>
              <button id="br-revert-btn" type="button" class="br-action-btn"         disabled>Revert</button>
              <button id="br-save-as-btn" type="button" class="br-action-btn"        disabled>Save as New DB…</button>
            </div>
          </div>
          <div id="br-attr-table"></div>
        </div>

      </div><!-- .br-col-detail -->
    </div><!-- .br-body -->
  </div><!-- #browser-overlay -->

  <!-- Entity inspect panel (populated and shown by inspect.js) -->
  <div id="inspect-panel" style="display:none">
    <button class="inspect-close" id="inspect-close" type="button" aria-label="Close">&#x2715;</button>
    <h3 id="inspect-title">Entity</h3>
    <div id="inspect-meta"></div>
    <div id="inspect-props"></div>
  </div>

  <!-- Stub-mode badge (shown when ?stub=1 or HOMEMODEL_MODE=stub) -->
  <div id="stub-indicator">STUB MODE</div>

  <!-- Walk controls hint -->
  <div id="controls-hint">WASD / Arrows — move &nbsp;|&nbsp; Right-click drag — look &nbsp;|&nbsp; Shift — sprint &nbsp;|&nbsp; Q/E — up/down</div>

  <!-- VR entry button -->
  <button id="vr-button" type="button">Enter VR</button>

  <!-- Reveal stub indicator if appropriate, before modules load -->
  <script>
    (function () {
      var isStub =
        new URLSearchParams(location.search).get('stub') === '1' ||
        window.HOMEMODEL_MODE === 'stub';
      if (isStub) {
        document.getElementById('stub-indicator').style.display = 'block';
      }

      // Disable the VR button if WebXR is unavailable.
      if (!navigator.xr) {
        var btn = document.getElementById('vr-button');
        btn.disabled = true;
        btn.title = 'WebXR not available in this browser';
      }
    })();
  </script>

  <!-- Main scene bootstrap (ES module) -->
  <script type="module" src="./scene.js"></script>

  <!-- Entity pick / inspect module (also imported by scene.js) -->
  <script type="module" src="./inspect.js"></script>

  <!-- Asset browser: DB chooser, entity list, isolated 3-D preview -->
  <script type="module">
    import { initBrowser } from './browser.js';
    // Delay until scene.js has had a chance to fetch the manifest.
    window.addEventListener('load', () => setTimeout(initBrowser, 100));
  </script>

  <!-- VR button handler — loaded as a module so it can dynamic-import xr.js -->
  <script type="module">
    document.getElementById('vr-button').addEventListener('click', async () => {
      const { requestXRSession } = await import('./xr.js');
      const config = await requestXRSession();
      if (config) {
        console.log('[index] XR session started:', config);
      }
    });
  </script>

</body>
</html>
