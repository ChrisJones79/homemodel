- acceptance:
  - pytest schema/tests/ passes
  - SchemaStore.attach_image(entity_id, image_record) stores image metadata linked
    to the entity
  - SchemaStore.bulk_upsert(batch) applies conflict_strategy (skip / overwrite / version_bump)
    correctly
  - ingestion/pipeline.py routes submit_image to attach_image and submit_bulk to bulk_upsert
  agent: claude
  area: 6
  custom_agent: ingestion-builder
  depends_on:
  - ingestion-001
  - schema-001
  description: 'Implement SchemaStore.attach_image and SchemaStore.bulk_upsert, then
    wire them into the ingestion pipeline.

    Follow the ImageRecord and EntityBatch contracts in contracts/ingestion_to_schema.yaml.

    SchemaStore.attach_image(entity_id: str, image_record: dict) -> str: Store image
    metadata in a new images table (or entity properties). Return the image id.

    SchemaStore.bulk_upsert(batch: dict) -> dict {created, updated, skipped, errors}:
    Apply conflict_strategy: skip (do not overwrite existing), overwrite (always replace),
    or version_bump (increment version, keep history).

    Update ingestion/pipeline.py so submit_image delegates to attach_image and submit_bulk
    delegates to bulk_upsert. Add tests for each conflict strategy.

    '
  id: ingestion-002
  issue_number: 29
  status: done
  title: Implement SchemaStore.attach_image and bulk_upsert with conflict strategies
